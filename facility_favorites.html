<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공공도서관 즐겨찾기</title>
<style>
  :root{
    --bg:#f4f6fa; --card:#fff; --line:#e3e8f0; --txt:#1f2937; --sub:#6b7280;
    --pri:#2563eb; --pri-d:#1d4ed8; --ok:#16a34a; --warn:#d97706; --bad:#dc2626;
    --star:#f59e0b; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);color:var(--txt);

  header{
    background:linear-gradient(135deg,#2563eb,#1e40af);color:#fff;

    box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  header h1{margin:0;font-size:18px;font-weight:700;letter-spacing:-.3px}
  header p{margin:4px 0 0;font-size:12px;opacity:.85}
  .wrap{max-width:680px;margin:0 auto;padding:16px}

  /* 탭 바 */
  .tabbar{
    position:fixed;bottom:0;left:0;right:0;background:#fff;
    border-top:1px solid var(--line);display:flex;z-index:30;
    box-shadow:0 -2px 8px rgba(0,0,0,.05);
  }
  .tabbar button{
    flex:1;border:0;background:none;padding:10px 4px 8px;cursor:pointer;
    color:var(--sub);font-size:11px;font-weight:600;display:flex;
    flex-direction:column;align-items:center;gap:3px;transition:color .15s;
  }
  .tabbar button .ic{font-size:20px;line-height:1}
  .tabbar button.active{color:var(--pri)}

  .page{display:none;animation:fade .25s ease}
  .page.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* 폼 요소 */
  label{display:block;font-size:13px;font-weight:600;margin:0 0 6px;color:#374151}
  select,input[type=text]{
    width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;background:#fff;color:var(--txt);outline:none;transition:border .15s;
  }
  select:focus,input:focus{border-color:var(--pri)}
  .field{margin-bottom:14px}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border:0;border-radius:10px;padding:12px 16px;font-size:15px;font-weight:700;

  .btn-danger{background:#fef2f2;color:var(--bad)}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap}

  /* 카드 */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:15px;margin-bottom:13px;box-shadow:var(--shadow);
  }
  .card h3{margin:0 0 4px;font-size:16px;font-weight:700;letter-spacing:-.3px}
  .badge{
    display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;
    border-radius:20px;background:#eef2ff;color:var(--pri);margin-left:6px;vertical-align:middle;
  }
  .meta{font-size:13px;color:var(--sub);margin:3px 0;display:flex;gap:6px}
  .meta b{color:#374151;font-weight:600;min-width:64px;flex-shrink:0}
  .card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .star-btn{background:#fffbeb;color:var(--star);border:1px solid #fde68a}
  .star-btn.on{background:var(--star);color:#fff;border-color:var(--star)}

  /* 좌석 현황 */
  .seats{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);display:none}
  .seats.show{display:block}
  .seat-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 10px;border-radius:8px;background:#f8fafc;margin-bottom:6px;font-size:13px;
  }
  .seat-row .nm{font-weight:600}
  .seat-num{font-weight:700;font-size:14px}
  .seat-pill{padding:2px 9px;border-radius:20px;font-size:12px;font-weight:700}

  .p-warn{background:#fef3c7;color:var(--warn)}

  .hint{font-size:12px;color:var(--sub);margin:8px 0 0}
  .empty{text-align:center;color:var(--sub);padding:40px 16px;font-size:14px}
  .empty .ic{font-size:40px;display:block;margin-bottom:10px;opacity:.5}
  .loading{text-align:center;padding:30px;color:var(--sub);font-size:14px}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid #c7d2fe;
    border-top-color:var(--pri);border-radius:50%;animation:r .7s linear infinite;vertical-align:-3px;margin-right:6px}
  @keyframes r{to{transform:rotate(360deg)}}
  .toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:#111827;color:#fff;padding:10px 18px;border-radius:24px;font-size:14px;
    z-index:50;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;

  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .section-title{font-size:14px;font-weight:700;color:#374151;margin:4px 0 12px;display:flex;align-items:center;gap:6px}
  .who{font-size:12px;color:var(--pri);font-weight:700;background:#eff6ff;padding:3px 9px;border-radius:20px}
  .dim{color:var(--sub);font-size:12px}

  details.debug pre{background:#0f172a;color:#cbd5e1;padding:10px;border-radius:8px;overflow:auto;max-height:200px;font-size:11px}
  .settings-row{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .settings-row h4{margin:0 0 4px;font-size:15px}

  .status-line{font-size:12px;color:var(--sub);margin-top:8px;text-align:center}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:12px;border-radius:10px;font-size:13px;margin-top:10px}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, addDoc, deleteDoc,
  onSnapshot, serverTimestamp, query, orderBy, getDocs, writeBatch
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===== Firebase 설정 (gift_money_manager.html과 동일) ===== */
const firebaseConfig = {
  apiKey: "AIzaSyAjSSHqqX5Ac4HcV1ao4jiQWm0OYhpyVzY",
  authDomain: "tndj-61fb0.firebaseapp.com",
  projectId: "tndj-61fb0",
  storageBucket: "tndj-61fb0.firebasestorage.app",
  messagingSenderId: "1049136604795",
  appId: "1:1049136604795:web:b1e79382b5908da823a4de",
  measurementId: "G-CDWGMGSE44"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const favCol = collection(db, "favorites");

/* ===== API 설정 ===== */
const API_BASE = "https://apis.data.go.kr/B551982/plr_v2";
const SERVICE_KEY = "966ec3467022c8650c1c159c618a28cef36bec568c50558401416b1edf27ea32";

const SIDO_LIST = ["서울","부산","대구","인천","광주","대전","울산","세종",
  "경기","강원","충북","충남","전북","전남","경북","경남","제주"];

/* ===== 공통 유틸 ===== */
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, m =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function toast(msg){
  const t = $("#toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove("show"), 2200);
}

// 객체에서 여러 후보 키 중 처음 발견되는 값 반환 (응답 스키마 유연 대응)
function pick(obj, keys){
  if(!obj) return "";
  for(const k of keys){
    for(const real of Object.keys(obj)){
      if(real.toLowerCase() === k.toLowerCase() && obj[real] != null && obj[real] !== "")
        return obj[real];
    }
  }
  return "";
}

/* ===== API 호출 (data.go.kr 직접 호출) =====
   GitHub Pages(HTTPS) 환경에서 공공데이터포털 API를 직접 호출합니다.
   - serviceKey는 raw 값 그대로 사용 (인코딩하지 않음)
   - 나머지 파라미터만 안전하게 인코딩                                   */
async function apiFetch(endpoint, params){
  const rawUrl = `${API_BASE}${endpoint}?serviceKey=${SERVICE_KEY}`
    + `&pageNo=1&numOfRows=${params.numOfRows || 10}&type=json`
    + Object.entries(params)
        .filter(([k])=>!["numOfRows"].includes(k))
        .map(([k,v])=>`&${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join("");

  const res = await fetch(rawUrl, {
    method: "GET",
    headers: { "Content-Type": "application/json" }
  });
  if(!res.ok) throw new Error("HTTP " + res.status + " " + res.statusText);

  const text = await res.text();
  return parseApiText(text);
}

// API 응답 텍스트 → JSON (JSON 우선, XML/에러 메시지 구분)
function parseApiText(text){
  try{
    return JSON.parse(text);
  }catch(e){
    const snippet = String(text || "").trim().slice(0, 200);
    if(/SERVICE_KEY|등록되지 않은|인증|LIMITED|<OpenAPI_ServiceResponse|errMsg/i.test(snippet))
      throw new Error("API 인증/응답 오류: " + snippet);
    throw new Error("JSON 파싱 실패(응답이 JSON 형식이 아님): " + snippet);
  }
}

// 응답 봉투에서 items 배열 추출 (response → body → item)
function extractItems(json){
  if(!json) return [];
  let item = json.response?.body?.item
    ?? json.response?.body?.items?.item
    ?? json.body?.item ?? json.item ?? json;
  if(Array.isArray(item)) return item;
  if(item && typeof item === "object") return [item];
  if(Array.isArray(json)) return json;
  return [];
}

// "090000" → "09:00" 형식으로 변환 (앞 2자리:다음 2자리)
function fmtTime(v){
  const s = String(v ?? "").trim().replace(/[^0-9]/g,"");
  if(s.length < 4) return s ? String(v).trim() : "";
  return `${s.slice(0,2)}:${s.slice(2,4)}`;
}
// 운영 시작~종료 시각을 "HH:MM~HH:MM" 형태로 결합
function joinHours(open, close){
  const o = fmtTime(open), c = fmtTime(close);
  if(!o && !c) return "";
  return `${o||"-"}~${c||"-"}`;
}

/* ===== 도서관 객체 정규화 (B551982/plr_v2/info_v2 실제 필드명 기준) ===== */
function normLib(raw){
  return {
    raw,
    name:    pick(raw, ["pblibNm","도서관명","name"]),
    type:    pick(raw, ["pblibSeNm","pblibTyNm","도서관유형","type"]),
    ctprvn:  pick(raw, ["ctpvNm","시도명"]),
    signgu:  pick(raw, ["sggNm","시군구명"]),
    addr:    pick(raw, ["pblibRoadNmAddr","도로명주소","주소","addr"]),
    lat:     pick(raw, ["lat","위도"]),
    lng:     pick(raw, ["lot","경도"]),
    tel:     pick(raw, ["pblibTelno","전화번호","tel"]),
    homepage:pick(raw, ["siteUrlAddr","홈페이지"]),
    weekday: joinHours(
      pick(raw, ["wkdyOperBgngTm"]),
      pick(raw, ["wkdyOperEndTm"])),
    sat: joinHours(
      pick(raw, ["wkndOperBgngTm"]),
      pick(raw, ["wkndOperEndTm"])),
    holiday: joinHours(
      pick(raw, ["lhldyOperBgngTm"]),
      pick(raw, ["lhldyOperEndTm"])),
    closed:  pick(raw, ["clsrInfoExpIn","휴관일"]),
    code:    pick(raw, ["pblibId","lbrryCd","code","id"]),
  };
}

/* ===== 운영시간 문자열 조립 ===== */
function hoursLine(lib){
  const parts = [];
  if(lib.weekday) parts.push(`평일 ${lib.weekday}`);
  if(lib.sat) parts.push(`주말 ${lib.sat}`);
  if(lib.holiday) parts.push(`공휴일 ${lib.holiday}`);
  return parts.join(" · ") || "정보 없음";
}

/* ===== 탭 전환 ===== */
$$(".tabbar button").forEach(b=>{
  b.addEventListener("click", ()=>{
    $$(".tabbar button").forEach(x=>x.classList.remove("active"));
    $$(".page").forEach(p=>p.classList.remove("active"));
    b.classList.add("active");
    $("#page-"+b.dataset.tab).classList.add("active");
  });
});

/* ===== 시도 드롭다운 채우기 ===== */
const sidoSel = $("#sido");
SIDO_LIST.forEach(s=>{
  const o = document.createElement("option"); o.value=s; o.textContent=s;
  sidoSel.appendChild(o);
});

/* ===== 검색 ===== */
$("#searchBtn").addEventListener("click", doSearch);

async function doSearch(){
  const sido = $("#sido").value.trim();
  const sigungu = $("#sigungu").value.trim();
  const box = $("#searchResult");
  if(!sido){ toast("시도를 선택하세요"); return; }

  box.innerHTML = `<div class="loading"><span class="spin"></span>도서관 검색 중…</div>`;
  try{
    // API가 sido 파라미터 필터링을 지원하지 않으므로 넉넉히 받아와 프론트에서 필터링
    const json = await apiFetch("/info_v2", { numOfRows: 100 });

    // ── 실제 응답 구조 확인용 로그 ──
    console.log("[info_v2] 원본 응답:", json);
    const rawItems = extractItems(json);
    console.log("[info_v2] items 개수:", rawItems.length, "첫 항목:", rawItems[0]);

    const items = rawItems.map(normLib);
    console.log("[info_v2] 정규화 결과:", items);

    // 프론트 필터링 — 시도(ctpvNm) + 시군구(sggNm)
    const filtered = items.filter(l=>{
      const sidoMatch = (l.ctprvn||"").includes(sido)
        || (l.ctprvn||"").includes(sidoFull(sido));
      const sgMatch = !sigungu || (l.signgu||"").includes(sigungu);
      return sidoMatch && sgMatch;
    });

    // 결과 없으면 안내 메시지
    if(filtered.length === 0){
      box.innerHTML = `<div class="empty"><span class="ic">📭</span>
        「${esc(sido)}${sigungu?" "+esc(sigungu):""}」 해당 지역 도서관이 없습니다.<br>
        <span class="dim">시군구명을 더 짧게 입력하거나 비워 보세요.</span></div>`;
      lastSearch = [];
      return;
    }

    renderSearch(filtered, "", json);
  }catch(e){
    box.innerHTML = `<div class="err">❌ 검색 실패<br>
      <span class="dim">${esc(e.message)}</span><br><br>
      <span class="dim">"Failed to fetch"가 보이면 CORS 또는 네트워크 문제입니다.
      이 기능은 GitHub Pages 등 HTTPS 환경에서 정상 동작하며, 로컬(file://)에서는 막힐 수 있습니다.
      그 외에는 API 인증키·파라미터 문제일 수 있습니다.</span></div>`;
  }
}

function sidoFull(s){
  const map = {"서울":"서울특별시","부산":"부산광역시","대구":"대구광역시","인천":"인천광역시",
    "광주":"광주광역시","대전":"대전광역시","울산":"울산광역시","세종":"세종특별자치시",
    "경기":"경기도","강원":"강원","충북":"충청북도","충남":"충청남도","전북":"전라북도",
    "전남":"전라남도","경북":"경상북도","경남":"경상남도","제주":"제주"};
  return map[s] || s;
}

function libCardHTML(lib, idx, opts={}){
  const favOn = opts.favOn;
  const debug = `<details class="debug"><summary>원본 데이터</summary><pre>${esc(JSON.stringify(lib.raw,null,2))}</pre></details>`;
  return `
  <div class="card" data-idx="${idx}">
    <h3>${esc(lib.name||"이름 없음")}${lib.type?`<span class="badge">${esc(lib.type)}</span>`:""}</h3>
    ${lib.addr?`<div class="meta"><b>📍 주소</b><span>${esc(lib.addr)}</span></div>`:""}
    <div class="meta"><b>🕒 운영</b><span>${esc(hoursLine(lib))}</span></div>
    ${lib.closed?`<div class="meta"><b>🚫 휴관일</b><span>${esc(lib.closed)}</span></div>`:""}
    ${lib.tel?`<div class="meta"><b>📞 전화</b><span>${esc(lib.tel)}</span></div>`:""}
    <div class="card-actions">
      <button class="btn btn-ghost btn-sm js-seats">🪑 열람실 현황 보기</button>
      ${opts.mode==="fav"
        ? `<button class="btn btn-danger btn-sm js-del">🗑️ 삭제</button>`
        : `<button class="btn star-btn btn-sm js-fav ${favOn?'on':''}">★ 즐겨찾기${favOn?' 됨':''}</button>`}
    </div>
    ${opts.who?`<div style="margin-top:8px"><span class="who">👤 ${esc(opts.who)}</span></div>`:""}
    <div class="seats" id="seats-${opts.mode||'s'}-${idx}"></div>
    ${debug}
  </div>`;
}

let lastSearch = []; // 검색 결과 캐시

function renderSearch(libs, note, rawJson){
  lastSearch = libs;
  const box = $("#searchResult");
  if(libs.length === 0){
    box.innerHTML = `<div class="empty"><span class="ic">🔍</span>검색 결과가 없습니다.</div>`;
    return;
  }
  box.innerHTML = (note||"") +
    `<div class="section-title">📋 검색 결과 ${libs.length}곳</div>` +
    libs.map((l,i)=>libCardHTML(l,i,{mode:"search", favOn: isFav(l)})).join("");

  // 이벤트 바인딩
  box.querySelectorAll(".card").forEach(card=>{
    const i = +card.dataset.idx;

      loadSeats(libs[i], `#seats-search-${i}`, ev.currentTarget));

/* ===== 열람실 실시간 좌석현황 ===== */
function seatRowHTML(r){
  const name = pick(r, ["rdrmNm","열람실명","readingRoomNm","roomNm","name","rdrm"]);
  const total = num(pick(r, ["seatCnt","출좌석수","totalSeat","seatNum","totSeatCnt","tseat"]));
  const remain = num(pick(r, ["rmndSeatCnt","잔여좌석수","remainSeat","emptySeatCnt","leftSeat","rseat"]));
  const cur = num(pick(r, ["currentVisitor","현재방문자수","useSeatCnt","occupiedSeat","nowVisitor","visitor"]));
  let used = (total!=null && remain!=null) ? total-remain : cur;
  let cls="p-ok", label="여유";
  if(total!=null && remain!=null){
    const rate = total>0 ? remain/total : 1;
    if(rate<=0){cls="p-bad";label="만석";}
    else if(rate<0.3){cls="p-warn";label="혼잡";}
  }
  const detail = (total!=null||remain!=null)
    ? `잔여 ${remain??"-"} / 좌석 ${total??"-"}`
    : (cur!=null ? `방문 ${cur}명` : "정보 없음");
  return `<div class="seat-row">
    <span class="nm">🪑 ${esc(name||"열람실")}</span>
    <span style="display:flex;align-items:center;gap:8px">
      <span class="seat-num">${esc(detail)}</span>
      <span class="seat-pill ${cls}">${label}</span>
    </span></div>`;
}
function num(v){ if(v===""||v==null) return null; const n=Number(String(v).replace(/[^0-9.-]/g,"")); return isNaN(n)?null:n; }

async function loadSeats(lib, sel, btn){
  const box = document.querySelector(sel);
  if(!box) return;
  if(box.classList.contains("show")){ box.classList.remove("show"); box.innerHTML=""; if(btn)btn.textContent="🪑 열람실 현황 보기"; return; }
  box.classList.add("show");
  box.innerHTML = `<div class="loading"><span class="spin"></span>실시간 좌석현황 조회 중…</div>`;
  if(btn) btn.textContent="🪑 현황 숨기기";

  // 도서관 식별 파라미터를 여러 후보로 시도
  const codeParams = buildCodeParams(lib);
  try{
    let items = [];
    // 1차: 코드 파라미터 있으면 그걸로 / 없거나 빈 결과면 전체 후 매칭
    if(Object.keys(codeParams).length){
      const j = await apiFetch("/rlt_rdrm_info_v2", { numOfRows: 100, ...codeParams });
      items = extractItems(j);
    }
    if(items.length === 0){
      const j2 = await apiFetch("/rlt_rdrm_info_v2", { numOfRows: 300 });
      const all = extractItems(j2);
      items = all.filter(r=>{
        const rn = String(pick(r,["lbrryNm","libNm","도서관명","fcltyNm"])||"");
        const rc = String(pick(r,["lbrryCd","libCode","도서관코드","code","manageCd","cd"])||"");
        return (lib.name && rn.includes(lib.name)) || (lib.code && rc===String(lib.code));
      });
      if(items.length===0 && all.length) items = all.slice(0,8); // 매칭 실패 시 일부 노출
    }
    if(items.length === 0){
      box.innerHTML = `<div class="dim" style="padding:10px 4px">실시간 좌석 정보가 없습니다.</div>`;
      return;
    }
    box.innerHTML = `<div class="section-title" style="margin-top:0">🪑 실시간 열람실 (${items.length})</div>`
      + items.map(seatRowHTML).join("")
      + `<div class="hint">업데이트: 방금 전</div>`;
  }catch(e){
    box.innerHTML = `<div class="err">좌석현황 조회 실패: ${esc(e.message)}</div>`;
  }
}

function buildCodeParams(lib){
  const p = {};
  if(lib.code){ p.lbrryCd = lib.code; }
  return p;
}

/* ===== 운영현황 (prst_info_v2) - 선택적 보강 ===== */
// (검색 카드에서는 핵심 정보 위주로 표시. 필요 시 확장 가능)

/* ===== Firebase 즐겨찾기 ===== */
let favList = []; // {id, ...lib fields, who}

function isFav(lib){
  return favList.some(f =>
    (f.name && f.name===lib.name) || (f.code && lib.code && f.code===lib.code));
}

async function addFav(lib, btn){
  const who = localStorage.getItem("myName") || "익명";
  if(isFav(lib)){ toast("이미 즐겨찾기에 있어요"); return; }
  try{
    if(btn){ btn.disabled=true; btn.textContent="저장 중…"; }
    await addDoc(favCol, {
      name: lib.name||"", type: lib.type||"", addr: lib.addr||"",
      tel: lib.tel||"", weekday: lib.weekday||"", sat: lib.sat||"",
      holiday: lib.holiday||"", closed: lib.closed||"", code: lib.code||"",
      lat: lib.lat||"", lng: lib.lng||"",
      raw: lib.raw||{}, who, createdAt: serverTimestamp()
    });
    toast("⭐ 즐겨찾기에 추가했어요");
    if(btn){ btn.classList.add("on"); btn.textContent="★ 즐겨찾기 됨"; btn.disabled=false; }
  }catch(e){
    toast("저장 실패: "+e.message);
    if(btn){ btn.disabled=false; btn.textContent="★ 즐겨찾기"; }
  }
}

async function delFav(id){
  try{ await deleteDoc(doc(db,"favorites",id)); toast("삭제했어요"); }
  catch(e){ toast("삭제 실패: "+e.message); }
}

// 실시간 구독
onSnapshot(query(favCol, orderBy("createdAt","desc")), snap=>{
  favList = snap.docs.map(d=>({ id:d.id, ...d.data(), ...normFromDoc(d.data()) }));
  renderFav();
}, err=>{
  $("#favResult").innerHTML = `<div class="err">즐겨찾기 로드 실패: ${esc(err.message)}</div>`;
});

// Firestore 문서 → lib 형태 정규화 (저장 필드 그대로 사용)
function normFromDoc(d){
  return {
    name:d.name, type:d.type, addr:d.addr, tel:d.tel,
    weekday:d.weekday, sat:d.sat, holiday:d.holiday, closed:d.closed,
    code:d.code, lat:d.lat, lng:d.lng, raw:d.raw||d
  };
}

function renderFav(){
  const box = $("#favResult");
  $("#favStatus").textContent = `총 ${favList.length}곳`;
  if(favList.length===0){
    box.innerHTML = `<div class="empty"><span class="ic">⭐</span>저장된 즐겨찾기가 없습니다.<br>
      <span class="dim">검색 탭에서 ★ 버튼으로 추가하세요.</span></div>`;
    return;
  }
  box.innerHTML = `<div class="section-title">⭐ 내 즐겨찾기 ${favList.length}곳</div>` +
    favList.map((l,i)=>libCardHTML(l,i,{mode:"fav", who:l.who})).join("");

  box.querySelectorAll(".card").forEach(card=>{
    const i = +card.dataset.idx;
    card.querySelector(".js-seats").addEventListener("click", ev=>
      loadSeats(favList[i], `#seats-fav-${i}`, ev.currentTarget));
    card.querySelector(".js-del").addEventListener("click", ()=>{
      if(confirm(`「${favList[i].name}」을(를) 삭제할까요?`)) delFav(favList[i].id);
    });
  });
}

// 즐겨찾기 좌석현황 일괄 새로고침
$("#refreshFavBtn").addEventListener("click", async ()=>{
  if(favList.length===0){ toast("즐겨찾기가 없습니다"); return; }
  $("#favStatus").textContent = "새로고침 중…";
  for(let i=0;i<favList.length;i++){
    const box = document.querySelector(`#seats-fav-${i}`);
    if(box && !box.classList.contains("show")){
      // 펼치기 + 로드
      const btn = $$("#favResult .card")[i]?.querySelector(".js-seats");
      await loadSeats(favList[i], `#seats-fav-${i}`, btn);
    }else{
      // 이미 펼쳐져 있으면 다시 로드
      box.classList.remove("show");
      const btn = $$("#favResult .card")[i]?.querySelector(".js-seats");
      await loadSeats(favList[i], `#seats-fav-${i}`, btn);
    }
  }
  $("#favStatus").textContent = `총 ${favList.length}곳 · 업데이트 완료`;
});
